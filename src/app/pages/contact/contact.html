<div #contact class="grid gap-12 md:grid-cols-[1fr_0.9fr] md:items-start">
  <div class="space-y-4" data-reveal>
    <p class="text-xs uppercase tracking-[0.35em] text-[#888]">Contact</p>
    <h1 class="text-3xl font-semibold md:text-4xl">Let’s build something solid</h1>
    <p class="text-sm leading-relaxed text-black/75 dark:text-white/75">
      Messages are stored in PostgreSQL and optionally forwarded over SMTP when configured on the API.
    </p>
    <div class="flex flex-wrap gap-4 pt-2 text-sm">
      <a
        class="text-[#888] underline-offset-4 hover:text-black hover:underline dark:hover:text-white"
        [href]="links.github"
        target="_blank"
        rel="noreferrer"
        >GitHub</a
      >
      <a
        class="text-[#888] underline-offset-4 hover:text-black hover:underline dark:hover:text-white"
        [href]="links.linkedin"
        target="_blank"
        rel="noreferrer"
        >LinkedIn</a
      >
    </div>
  </div>

  <form
    class="space-y-4 rounded border border-black/10 bg-white p-6 dark:border-white/10 dark:bg-black"
    [formGroup]="form"
    (ngSubmit)="submit()"
    data-reveal
  >
    <div class="space-y-1">
      <label class="text-[11px] uppercase tracking-widest text-[#888]" for="name">Name</label>
      <input
        id="name"
        class="w-full border border-black/15 bg-transparent px-3 py-2 text-sm outline-none ring-black/30 focus:ring-2 dark:border-white/20 dark:ring-white/30"
        type="text"
        formControlName="name"
        autocomplete="name"
      />
    </div>
    <div class="space-y-1">
      <label class="text-[11px] uppercase tracking-widest text-[#888]" for="email">Email</label>
      <input
        id="email"
        class="w-full border border-black/15 bg-transparent px-3 py-2 text-sm outline-none ring-black/30 focus:ring-2 dark:border-white/20 dark:ring-white/30"
        type="email"
        formControlName="email"
        autocomplete="email"
      />
    </div>
    <div class="space-y-1">
      <label class="text-[11px] uppercase tracking-widest text-[#888]" for="message">Message</label>
      <textarea
        id="message"
        class="min-h-[140px] w-full resize-y border border-black/15 bg-transparent px-3 py-2 text-sm outline-none ring-black/30 focus:ring-2 dark:border-white/20 dark:ring-white/30"
        formControlName="message"
      ></textarea>
    </div>

    @if (error()) {
      <p class="text-xs text-red-600 dark:text-red-400">{{ error() }}</p>
    }
    @if (sent()) {
      <p class="text-xs text-emerald-700 dark:text-emerald-400">Thanks — message received.</p>
    }

    <button
      type="submit"
      class="w-full rounded border border-black bg-black py-2.5 text-xs font-medium uppercase tracking-widest text-white transition hover:bg-transparent hover:text-black disabled:cursor-not-allowed disabled:opacity-50 dark:border-white dark:bg-white dark:text-black dark:hover:bg-transparent dark:hover:text-white"
      [disabled]="sending()"
    >
      {{ sending() ? 'Sending…' : 'Send' }}
    </button>
  </form>
</div>
