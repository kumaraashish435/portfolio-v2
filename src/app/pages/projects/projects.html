<div #projects class="space-y-10">
  <header class="max-w-2xl space-y-3">
    <p class="text-xs uppercase tracking-[0.35em] text-[#888]">Work</p>
    <h1 class="text-3xl font-semibold md:text-4xl">Projects</h1>
    <p class="text-sm text-black/75 dark:text-white/75">
      Pulled from the API when available; graceful static fallback if the backend is offline.
    </p>
  </header>

  <div class="grid gap-6 md:grid-cols-2">
    @for (p of items(); track p.id) {
      <article
        data-card
        class="group flex h-full flex-col rounded border border-black/10 bg-white p-5 transition-colors dark:border-white/10 dark:bg-black"
        (mouseenter)="onCardHover($event, true)"
        (mouseleave)="onCardHover($event, false)"
      >
        <div class="flex items-start justify-between gap-3">
          <h2 class="text-lg font-semibold">{{ p.title }}</h2>
          <a
            class="text-[11px] uppercase tracking-widest text-[#888] underline-offset-4 hover:text-black hover:underline dark:hover:text-white"
            [href]="p.githubUrl"
            target="_blank"
            rel="noreferrer"
            >GitHub</a
          >
        </div>
        <p class="mt-3 flex-1 text-sm leading-relaxed text-black/80 dark:text-white/80">
          {{ p.description }}
        </p>
        <div class="mt-4 flex flex-wrap gap-2">
          @for (t of p.techStack; track t) {
            <span
              class="rounded border border-black/10 px-2 py-0.5 text-[10px] uppercase tracking-wide text-[#888] dark:border-white/10"
              >{{ t }}</span
            >
          }
        </div>
      </article>
    }
  </div>
</div>
